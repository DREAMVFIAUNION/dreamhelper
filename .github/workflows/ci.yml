name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'
  PNPM_VERSION: '9'

jobs:
  # ── Stage 1: Lint + Build ──
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm --filter web-portal exec tsc --noEmit
        continue-on-error: true

      - name: Build web-portal
        run: pnpm --filter web-portal build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-portal-build
          path: apps/web-portal/.next
          retention-days: 1

  # ── Stage 2: Frontend Tests ──
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vitest
        run: cd apps/web-portal && npx vitest run --reporter=verbose

  # ── Stage 2: Gateway Tests ──
  test-gateway:
    name: Gateway Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Gateway Jest tests
        run: cd services/gateway && npx jest --passWithNoTests --verbose

  # ── Stage 2: Backend Tests ──
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('services/brain-core/requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          cd services/brain-core
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run pytest
        run: cd services/brain-core && pytest tests/ -v --tb=short

  # ── Stage 3: Docker Build (main only) ──
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build web-portal image
        run: docker build -f apps/web-portal/Dockerfile -t dreamhelp-web:${{ github.sha }} .

      - name: Build brain-core image
        run: docker build -f services/brain-core/Dockerfile -t dreamhelp-brain:${{ github.sha }} services/brain-core/

      - name: Build gateway image
        run: docker build -f services/gateway/Dockerfile -t dreamhelp-gateway:${{ github.sha }} .

  # ── Summary ──
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-and-build, test-frontend, test-gateway, test-backend]
    if: always()
    steps:
      - name: Report status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.lint-and-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Tests | ${{ needs.test-frontend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Gateway Tests | ${{ needs.test-gateway.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Tests | ${{ needs.test-backend.result }} |" >> $GITHUB_STEP_SUMMARY
