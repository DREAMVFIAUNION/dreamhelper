name: Feature request
description: Suggest a focused improvement for DreamHelper
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should be built or changed?
    validations:
      required: true
  - type: textarea
    id: value
    attributes:
      label: Value
      description: Why is this important for users or contributors?
  - type: textarea
    id: context
    attributes:
      label: Additional context
